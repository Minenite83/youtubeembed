<!DOCTYPE html>
<!--https://youtu.be/KpEhFyF0IpY-->
<html lang="en">
  <head>
    <meta charset="utf-8">
    <style>
      body{
        background-color:black;
      }
      #form{
        position:fixed;
        top:0px;
        left:0px;
        padding:10px;
        opacity:0;
        transition:opacity 0.1s ease-out;
      }
      #form:hover{
        opacity:1;
      }
      iframe{
        position:fixed;
        top:0px;
        left:0px;
        width:100%;
        height:100%;
      }
      #alert{
        position:fixed;
        background-color:black;
        bottom:5px;
        right:5px;
        text-align:center;
        border:5px solid red;
        padding:20px 40px;
        color:white;
        font-family:monospace,monospace;
        visibility:hidden;
      }
    </style>
  </head>
  <body>
    <iframe src="https://www.youtube-nocookie.com/embed/KpEhFyF0IpY" allow="fullscreen;accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture;web-share" allowfullscreen referrerpolicy="strict-origin-when-cross-origin" frameborder="0"></iframe>
    <div id="form">
      <input type="text">
      <button type="submit">Submit</button>
    </div>
    <div id="alert">Not a valid youtube video</div>
    <script>
      const iframe = document.getElementsByTagName("iframe")[0];
      const inp = document.getElementsByTagName("input")[0];
      const submit = document.getElementsByTagName("button")[0];
      const alt = document.getElementById("alert");
      const setIframe = function(){
        const str = inp.value;
        if(str !== ""){
          let id = "";
          let m = [];
          switch(true){
            case Boolean(str.match(/youtube/)):
              m = str.match(/v=([\w-]{11})/);
              if(m){
                id = m[1];
              }
              break;
            case Boolean(str.match(/youtu.be/)):
              m = str.match(/[\w-]{11}/);
              if(m){
                id = m[0];
              }
              break;
            default:
              m = str.match(/[\w-]{11}/);
              if(m){
                id = m[0];
              }
              break;
          }
          console.clear();
          console.log(m);
          console.log(id);
          if(id === ""){
            alt.style.visibility="visible";
            return;
          }
          alt.style.visibility="hidden";
          iframe.src="https://www.youtube-nocookie.com/embed/"+id;
          iframe.requestFullscreen();
        }
      };
      
      submit.addEventListener("click",setIframe);
      inp.addEventListener("keyup",function(e){
        if(e.which === 13){
          setIframe();
        }
      });
    </script>
    <div style="position:fixed;top:0px;left:0px;color:white;">1</div>
  </body>
</html>
