<!DOCTYPE html><!--https://youtu.be/KpEhFyF0IpY--><html lang="en"><head><meta charset="utf-8"><style>body{background-color:black;}#form{position:fixed;top:0px;left:0px;padding:10px;opacity:0;transition:opacity 0.1s ease-out;}#form:hover{opacity:1;}iframe{position:fixed;top:0px;left:0px;width:100%;height:100%;}#alert{position:fixed;background-color:black;bottom:5px;right:5px;text-align:center;border:5px solid red;padding:20px 40px;color:white;font-family:monospace,monospace;visibility:hidden;}</style></head><body><iframe src="https://www.youtube-nocookie.com/embed" allow="fullscreen;accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture;web-share" allowfullscreen referrerpolicy="strict-origin-when-cross-origin" frameborder="0"></iframe><div id="form"><input type="text"><button type="submit">Submit</button></div><div id="alert">Not a valid youtube video</div><script>const iframe=document.getElementsByTagName("iframe")[0];const inp=document.getElementsByTagName("input")[0];const submit=document.getElementsByTagName("button")[0];const alt=document.getElementById("alert");const setIframe=function(){const str=inp.value;if(str!==""){let id="";switch(true){case Boolean(str.match(/youtube/)):id=(str.match(/v=([\w-]{11})/)??"")[1];break;case Boolean(str.match(/youtu.be/)):id=(str.match(/([\w-]{11})/)??"")[1];break;default:id=(str.match(/[\w-]{11}/)??"")[0];break;}if(typeof id==="undefined"){alt.style.visibility="visible";return;}alt.style.visibility="hidden";iframe.src="https://www.youtube-nocookie.com/embed/"+id;iframe.requestFullscreen();}};submit.addEventListener("click",setIframe);inp.addEventListener("keyup",function(e){if(e.which===13){setIframe();}});</script></body></html>
